<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ SKY BIRD | Fullscreen Aviator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            background: #0a2f3a;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        /* Fullscreen canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: none;
        }

        /* Minimal UI - only top left corner */
        .stats {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 28px;
            border-left: 4px solid #ffd966;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
            font-weight: bold;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            color: #f5f9ff;
            text-shadow: 0 1px 2px black;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .stat-item:first-child {
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: normal;
            color: #ffd966;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
            font-family: monospace;
            color: #fff2cf;
        }

        /* Restart button - minimal but tappable */
        .restart-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 100;
            background: #ffaa33;
            border: none;
            font-weight: bold;
            font-family: inherit;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a3e00;
            color: #1f2f2c;
            touch-action: manipulation;
            pointer-events: auto;
            transition: 0.05s linear;
            letter-spacing: 1px;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7a3e00;
        }

        /* Game over overlay - subtle */
        .game-over-tip {
            position: fixed;
            bottom: 30%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 90;
            pointer-events: none;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffaa77;
            text-shadow: 0 2px 8px black;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-family: monospace;
        }

        /* Mobile landscape optimizations */
        @media (max-width: 800px) and (orientation: landscape) {
            .stat-value { font-size: 1.5rem; }
            .stat-label { font-size: 0.6rem; }
            .stats { padding: 6px 14px; top: 10px; left: 10px; }
            .restart-btn { padding: 8px 18px; font-size: 0.9rem; bottom: 15px; right: 15px; }
            .game-over-tip { font-size: 1.2rem; bottom: 35%; padding: 5px 14px; }
        }

        @media (max-width: 550px) {
            .stat-value { font-size: 1.3rem; }
            .stats { padding: 5px 12px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">🏆 SCORE</span>
            <span class="stat-value" id="scoreValue">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">💰 COINS</span>
            <span class="stat-value" id="coinValue">0</span>
        </div>
    </div>
    <button class="restart-btn" id="resetGameBtn">✈️ RESTART</button>
    <div id="gameOverMsg" class="game-over-tip" style="display: none;">💥 GAME OVER 💥</div>

<script>
    (function(){
        // -------------------- FULLSCREEN CANVAS --------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let WORLD_W, WORLD_H;
        
        function updateCanvasSize() {
            WORLD_W = window.innerWidth;
            WORLD_H = window.innerHeight;
            canvas.width = WORLD_W;
            canvas.height = WORLD_H;
        }
        
        window.addEventListener('resize', () => {
            updateCanvasSize();
            // reposition player after resize
            if (playerY !== undefined) {
                playerY = Math.min(Math.max(playerY, 20), WORLD_H - PLAYER_H - 20);
                targetY = playerY;
            }
        });
        updateCanvasSize();
        
        // -------------------- GAME STATE --------------------
        let gameRunning = true;
        let score = 0;
        let totalCoins = 0;
        let bestScore = 0;
        
        // Load best score from localStorage
        try {
            const saved = localStorage.getItem('fullscreen_aviator_best');
            if(saved && !isNaN(parseInt(saved))) bestScore = parseInt(saved);
        } catch(e) {}
        
        // -------------------- PLAYER (BIRD) --------------------
        const PLAYER_W = 48;
        const PLAYER_H = 38;
        let playerX = 110;
        let playerY = WORLD_H/2 - PLAYER_H/2;
        let targetY = playerY;
        
        // Momentum for smooth but responsive movement
        let momentum = 0;
        const MOMENTUM_FACTOR = 0.32;
        const MAX_SPEED_Y = 12;
        
        // -------------------- DYNAMIC SPEED --------------------
        let BASE_SPEED = 4.2;     // faster base for excitement
        let currentWorldSpeed = BASE_SPEED;
        let speedMultiplier = 1.0;
        let speedTimer = 0;
        
        // -------------------- OBSTACLES --------------------
        let obstacles = [];
        
        // -------------------- COINS --------------------
        let coins = [];
        const COIN_SIZE = 22;
        let coinSpawnCounter = 0;
        let coinSpawnDelay = 32;
        
        // -------------------- PARTICLES --------------------
        let particles = [];
        let trailParticles = [];
        
        // Spawn control
        let framesSinceLastSpawn = 0;
        let spawnDelayFrames = 38;
        
        // UI Elements
        const scoreElement = document.getElementById('scoreValue');
        const coinElement = document.getElementById('coinValue');
        const gameOverMsgDiv = document.getElementById('gameOverMsg');
        
        function updateScoreUI() {
            scoreElement.innerText = Math.floor(score);
            if(Math.floor(score) > bestScore){
                bestScore = Math.floor(score);
                try { localStorage.setItem('fullscreen_aviator_best', bestScore); } catch(e) {}
            }
        }
        
        function updateCoinUI() {
            coinElement.innerText = totalCoins;
        }
        
        // -------------------- GRADUAL SPEED INCREASE (slowly speed up) --------------------
        function updateGradualSpeed() {
            if(!gameRunning) return;
            speedTimer++;
            if(speedTimer >= 70) {
                speedTimer = 0;
                speedMultiplier = Math.min(3.0, speedMultiplier + 0.048);
                currentWorldSpeed = BASE_SPEED * speedMultiplier;
                
                // adjust spawn delays based on speed
                let baseDelay = 44;
                let dynamicDelay = Math.floor(baseDelay / (0.75 + (speedMultiplier * 0.5)));
                spawnDelayFrames = Math.max(22, Math.min(50, dynamicDelay));
                coinSpawnDelay = Math.max(24, Math.floor(36 / (0.85 + speedMultiplier * 0.4)));
            }
        }
        
        // -------------------- SPAWN OBSTACLES & COINS --------------------
        function spawnObstacle() {
            let variant = Math.random();
            let obsW, obsH;
            let type = "missile";
            if(variant < 0.3) {
                obsW = 32 + Math.random() * 20;
                obsH = 34 + Math.random() * 18;
                type = "barrier";
            } else if(variant < 0.65) {
                obsW = 20 + Math.random() * 14;
                obsH = 44 + Math.random() * 18;
                type = "missile";
            } else {
                obsW = 30;
                obsH = 30;
                type = "mine";
            }
            let randY = Math.random() * (WORLD_H - obsH - 35) + 18;
            randY = Math.min(Math.max(randY, 15), WORLD_H - obsH - 15);
            obstacles.push({
                x: WORLD_W,
                y: randY,
                width: obsW,
                height: obsH,
                type: type,
                rotation: 0
            });
        }
        
        function spawnCoin() {
            let randY = Math.random() * (WORLD_H - COIN_SIZE - 45) + 22;
            randY = Math.min(Math.max(randY, 20), WORLD_H - COIN_SIZE - 20);
            coins.push({
                x: WORLD_W,
                y: randY,
                width: COIN_SIZE,
                height: COIN_SIZE,
                spin: Math.random() * Math.PI * 2
            });
        }
        
        // -------------------- LOGIC UPDATES --------------------
        function updateObstaclesAndCoins() {
            if(!gameRunning) return;
            
            // move obstacles
            for(let i=0; i<obstacles.length; i++){
                obstacles[i].x -= currentWorldSpeed;
                if(obstacles[i].type === 'mine') {
                    obstacles[i].rotation = (obstacles[i].rotation || 0) + 0.1;
                }
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            // move coins
            for(let i=0; i<coins.length; i++){
                coins[i].x -= currentWorldSpeed;
                coins[i].spin += 0.16;
            }
            coins = coins.filter(coin => coin.x + COIN_SIZE > 0);
            
            const playerRect = {
                x: playerX,
                y: playerY,
                w: PLAYER_W,
                h: PLAYER_H
            };
            
            // Coin collection
            for(let i=0; i<coins.length; i++){
                const coin = coins[i];
                const coinRect = { x: coin.x, y: coin.y, w: COIN_SIZE, h: COIN_SIZE };
                if(playerRect.x < coinRect.x + coinRect.w &&
                   playerRect.x + playerRect.w > coinRect.x &&
                   playerRect.y < coinRect.y + coinRect.h &&
                   playerRect.y + playerRect.h > coinRect.y){
                    totalCoins++;
                    updateCoinUI();
                    // coin particles
                    for(let p=0; p<14; p++){
                        particles.push({
                            x: coin.x + COIN_SIZE/2,
                            y: coin.y + COIN_SIZE/2,
                            vx: (Math.random() - 0.5) * 5,
                            vy: (Math.random() - 0.5) * 5 - 1.5,
                            life: 0.85,
                            size: 3 + Math.random() * 5,
                            color: `hsl(${45 + Math.random() * 30}, 95%, 58%)`
                        });
                    }
                    coins.splice(i,1);
                    i--;
                }
            }
            
            // Obstacle collision
            for(let i=0; i<obstacles.length; i++){
                const obs = obstacles[i];
                const obsRect = { x: obs.x, y: obs.y, w: obs.width, h: obs.height };
                if(playerRect.x < obsRect.x + obsRect.w &&
                   playerRect.x + playerRect.w > obsRect.x &&
                   playerRect.y < obsRect.y + obsRect.h &&
                   playerRect.y + playerRect.h > obsRect.y){
                    setGameOver();
                    break;
                }
            }
        }
        
        function updateScore() {
            if(!gameRunning) return;
            let increment = 0.2 + (speedMultiplier * 0.1);
            score += increment;
            updateScoreUI();
        }
        
        function handleSpawning() {
            if(!gameRunning) return;
            if(framesSinceLastSpawn >= spawnDelayFrames){
                spawnObstacle();
                framesSinceLastSpawn = 0;
                if(speedMultiplier > 1.6 && Math.random() < 0.28) spawnObstacle();
            } else {
                framesSinceLastSpawn++;
            }
            
            if(coinSpawnCounter >= coinSpawnDelay){
                spawnCoin();
                coinSpawnCounter = 0;
                if(speedMultiplier > 1.3 && Math.random() < 0.35) spawnCoin();
            } else {
                coinSpawnCounter++;
            }
        }
        
        function setGameOver() {
            if(!gameRunning) return;
            gameRunning = false;
            gameOverMsgDiv.style.display = "block";
            // explosion particles
            for(let p=0; p<50; p++){
                particles.push({
                    x: playerX + PLAYER_W/2,
                    y: playerY + PLAYER_H/2,
                    vx: (Math.random() - 0.5) * 9,
                    vy: (Math.random() - 0.5) * 9 - 2,
                    life: 0.98,
                    size: 3 + Math.random() * 8,
                    color: `hsl(${15 + Math.random() * 40}, 85%, 58%)`
                });
            }
        }
        
        function resetGame() {
            gameRunning = true;
            score = 0;
            totalCoins = 0;
            updateScoreUI();
            updateCoinUI();
            gameOverMsgDiv.style.display = "none";
            currentWorldSpeed = BASE_SPEED;
            speedMultiplier = 1.0;
            speedTimer = 0;
            obstacles = [];
            coins = [];
            particles = [];
            trailParticles = [];
            playerY = WORLD_H/2 - PLAYER_H/2;
            targetY = playerY;
            momentum = 0;
            framesSinceLastSpawn = 5;
            coinSpawnCounter = 3;
            spawnDelayFrames = 38;
            coinSpawnDelay = 32;
        }
        
        // -------------------- BIRD MOVEMENT (ENHANCED MOMENTUM) --------------------
        function updatePlayerMomentum() {
            if(!gameRunning) return;
            let diff = targetY - playerY;
            momentum = momentum * 0.8 + diff * MOMENTUM_FACTOR;
            momentum = Math.min(MAX_SPEED_Y, Math.max(-MAX_SPEED_Y, momentum));
            playerY += momentum;
            playerY = Math.min(Math.max(playerY, 15), WORLD_H - PLAYER_H - 15);
        }
        
        // -------------------- PARTICLES UPDATE --------------------
        function updateParticles() {
            for(let i=0; i<particles.length; i++){
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.022;
                if(p.x > WORLD_W+100 || p.x < -100 || p.y > WORLD_H+120 || p.y < -120 || p.life <= 0){
                    particles.splice(i,1);
                    i--;
                }
            }
            
            // Trail effect while flying
            if(gameRunning && Math.random() < 0.55){
                trailParticles.push({
                    x: playerX - 3,
                    y: playerY + PLAYER_H/2 - 2 + (Math.random() - 0.5)*10,
                    vx: -2.2 + (Math.random() - 0.5)*1.2,
                    vy: (Math.random() - 0.5)*1.5,
                    life: 0.68,
                    size: 2.5 + Math.random() * 5,
                    color: `rgba(255, 180, 70, ${0.6 + Math.random()*0.4})`
                });
            }
            for(let i=0; i<trailParticles.length; i++){
                const t = trailParticles[i];
                t.x += t.vx;
                t.y += t.vy;
                t.life -= 0.028;
                if(t.x < -60 || t.life <= 0){
                    trailParticles.splice(i,1);
                    i--;
                }
            }
        }
        
        // -------------------- TOUCH & MOUSE HANDLING (fullscreen) --------------------
        let activePointerId = null;
        
        function handleMove(clientY) {
            if(!gameRunning) return;
            let rect = canvas.getBoundingClientRect();
            let scaleY = canvas.height / rect.height;
            let canvasY = (clientY - rect.top) * scaleY;
            let newY = canvasY - PLAYER_H/2;
            newY = Math.min(Math.max(newY, 15), WORLD_H - PLAYER_H - 15);
            targetY = newY;
        }
        
        function onPointerStart(e) {
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            if(!point) return;
            let rect = canvas.getBoundingClientRect();
            let scaleY = canvas.height / rect.height;
            let canvasY = (point.clientY - rect.top) * scaleY;
            let newY = canvasY - PLAYER_H/2;
            newY = Math.min(Math.max(newY, 15), WORLD_H - PLAYER_H - 15);
            if(gameRunning) targetY = newY;
            if(e.touches) activePointerId = e.touches[0].identifier;
        }
        
        function onPointerMove(e) {
            e.preventDefault();
            let clientY = null;
            if(e.touches) {
                if(activePointerId !== null) {
                    for(let i=0; i<e.touches.length; i++) {
                        if(e.touches[i].identifier === activePointerId) {
                            clientY = e.touches[i].clientY;
                            break;
                        }
                    }
                } else if(e.touches.length > 0) clientY = e.touches[0].clientY;
            } else {
                clientY = e.clientY;
            }
            if(clientY !== null && gameRunning) handleMove(clientY);
        }
        
        function onPointerEnd(e) { e.preventDefault(); activePointerId = null; }
        
        canvas.addEventListener('touchstart', onPointerStart, { passive: false });
        canvas.addEventListener('touchmove', onPointerMove, { passive: false });
        canvas.addEventListener('touchend', onPointerEnd);
        canvas.addEventListener('touchcancel', onPointerEnd);
        canvas.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', (e) => {
            if(e.buttons === 1 && gameRunning) handleMove(e.clientY);
        });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // -------------------- DRAWING (fullscreen immersive) --------------------
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, WORLD_H);
            grad.addColorStop(0, "#1f8b9e");
            grad.addColorStop(1, "#0c4e5c");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WORLD_W, WORLD_H);
            
            // dynamic clouds
            ctx.fillStyle = "#fdf8e7cc";
            ctx.beginPath();
            ctx.ellipse(180, 80, 85, 50, 0, 0, Math.PI*2);
            ctx.ellipse(290, 65, 60, 42, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(WORLD_W-200, 110, 90, 55, 0, 0, Math.PI*2);
            ctx.ellipse(WORLD_W-100, 85, 65, 45, 0, 0, Math.PI*2);
            ctx.fill();
            
            // sun glow
            ctx.fillStyle = "#ffdf88";
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(70, 70, 48, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawBird() {
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.fillStyle = "#f5b042";
            ctx.beginPath();
            ctx.roundRect(playerX, playerY, PLAYER_W-4, PLAYER_H, 12);
            ctx.fill();
            ctx.fillStyle = "#e06e2e";
            ctx.fillRect(playerX+PLAYER_W-18, playerY+6, 15, PLAYER_H-12);
            // wing
            ctx.fillStyle = "#ffcc66";
            ctx.beginPath();
            ctx.moveTo(playerX+12, playerY+PLAYER_H/2);
            ctx.lineTo(playerX+32, playerY+PLAYER_H/2-11);
            ctx.lineTo(playerX+32, playerY+PLAYER_H/2+11);
            ctx.fill();
            // eye
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(playerX+22, playerY+PLAYER_H/2-5, 7, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#010101";
            ctx.beginPath();
            ctx.arc(playerX+20, playerY+PLAYER_H/2-6, 3.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(playerX+18, playerY+PLAYER_H/2-8, 1.5, 0, Math.PI*2);
            ctx.fill();
            // beak
            ctx.fillStyle = "#ff8c42";
            ctx.beginPath();
            ctx.moveTo(playerX+38, playerY+PLAYER_H/2-4);
            ctx.lineTo(playerX+50, playerY+PLAYER_H/2);
            ctx.lineTo(playerX+38, playerY+PLAYER_H/2+4);
            ctx.fill();
            ctx.restore();
        }
        
        function drawCoins() {
            for(let coin of coins) {
                ctx.save();
                ctx.shadowBlur = 6;
                ctx.shadowColor = "gold";
                let angle = coin.spin;
                ctx.translate(coin.x + COIN_SIZE/2, coin.y + COIN_SIZE/2);
                ctx.rotate(Math.sin(angle) * 0.5);
                ctx.fillStyle = "#FFD966";
                ctx.beginPath();
                ctx.arc(0, 0, COIN_SIZE/2 - 2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#FFAA33";
                ctx.beginPath();
                ctx.arc(0, 0, COIN_SIZE/2 - 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#D4AF37";
                ctx.font = `bold ${Math.floor(COIN_SIZE-7)}px monospace`;
                ctx.fillText("💰", -8, 6);
                ctx.setTransform(1,0,0,1,0,0);
                ctx.restore();
            }
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                ctx.save();
                if(obs.type === "missile") {
                    ctx.fillStyle = "#e03a4e";
                    ctx.beginPath();
                    ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 8);
                    ctx.fill();
                    ctx.fillStyle = "#f5a442";
                    for(let i=0;i<3;i++) ctx.fillRect(obs.x+6, obs.y+10+i*10, obs.width-14, 2);
                } else if(obs.type === "barrier") {
                    ctx.fillStyle = "#7a5d46";
                    ctx.beginPath();
                    ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 10);
                    ctx.fill();
                    ctx.fillStyle = "#bc8f6a";
                    ctx.fillRect(obs.x+6, obs.y+6, obs.width-12, obs.height-12);
                    ctx.fillStyle = "#ff9933";
                    ctx.font = "bold 18px monospace";
                    ctx.fillText("⛔", obs.x+obs.width/2-12, obs.y+obs.height/2+7);
                } else {
                    ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                    ctx.rotate(obs.rotation);
                    ctx.fillStyle = "#6a4c3c";
                    ctx.beginPath();
                    ctx.arc(0, 0, obs.width/2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#f2542d";
                    ctx.font = "bold 20px monospace";
                    ctx.fillText("💣", -10, -9);
                    ctx.setTransform(1,0,0,1,0,0);
                }
                ctx.restore();
            }
        }
        
        function drawParticlesAndTrail() {
            for(let t of trailParticles) {
                ctx.globalAlpha = t.life;
                ctx.fillStyle = t.color;
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.size, 0, Math.PI*2);
                ctx.fill();
            }
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function drawSpeedHint() {
            // subtle speed indicator (minimal)
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#ffecb3";
            ctx.shadowBlur = 2;
            ctx.fillText(`⚡ ${speedMultiplier.toFixed(1)}x`, WORLD_W - 55, 35);
            ctx.shadowBlur = 0;
        }
        
        // Helper: roundRect
        if(!CanvasRenderingContext2D.prototype.roundRect){
            CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
                if (w < 2*r) r = w/2;
                if (h < 2*r) r = h/2;
                this.moveTo(x+r,y);
                this.lineTo(x+w-r,y);
                this.quadraticCurveTo(x+w,y,x+w,y+r);
                this.lineTo(x+w,y+h-r);
                this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
                this.lineTo(x+r,y+h);
                this.quadraticCurveTo(x,y+h,x,y+h-r);
                this.lineTo(x,y+r);
                this.quadraticCurveTo(x,y,x+r,y);
                return this;
            };
        }
        
        // -------------------- MAIN GAME LOOP --------------------
        function updateGame() {
            if(gameRunning){
                updatePlayerMomentum();
                updateObstaclesAndCoins();
                updateScore();
                handleSpawning();
                updateGradualSpeed();
            }
            updateParticles();
        }
        
        function draw() {
            drawBackground();
            drawCoins();
            drawObstacles();
            drawParticlesAndTrail();
            drawBird();
            drawSpeedHint();
        }
        
        function animate() {
            updateGame();
            draw();
            requestAnimationFrame(animate);
        }
        
        // Reset button event
        const resetBtn = document.getElementById('resetGameBtn');
        resetBtn.addEventListener('click', () => resetGame());
        resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetGame(); });
        
        // initial reset & start
        resetGame();
        updateScoreUI();
        updateCoinUI();
        animate();
        
        // handle orientation change + canvas resize
        window.addEventListener('resize', () => {
            updateCanvasSize();
            playerY = Math.min(Math.max(playerY, 15), WORLD_H - PLAYER_H - 15);
            targetY = playerY;
        });
    })();
</script>
</body>
</html>
